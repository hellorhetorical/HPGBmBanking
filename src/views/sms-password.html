<div class="binddevice-page profile-password-page">
  <header class="binddevice-hero">
    <div class="binddevice-badge">Profile</div>
    <div class="binddevice-title">{{ vm.title }}</div>
    <div class="binddevice-subtitle">Set a new SMS password for bill alerts.</div>
  </header>

  <section class="binddevice-card" ng-if="vm.step === 'form'">
    <div class="binddevice-card-title">SMS Password</div>
    <label class="transfer-field">
      <span class="transfer-field-label">New SMS Password</span>
      <input type="password" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" ng-model="vm.form.next" placeholder="New SMS Password" />
    </label>
    <label class="transfer-field">
      <span class="transfer-field-label">Confirm new SMS password</span>
      <input type="password" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" ng-model="vm.form.confirm" placeholder="Confirm new SMS password" />
    </label>
    <div class="transfer-error" ng-if="vm.error">{{ vm.error }}</div>
    <button class="account-statement-button" type="button" ng-click="vm.submit()">Submit</button>
  </section>

  <section class="binddevice-card transfer-status-card" ng-if="vm.step === 'success'">
    <div class="transfer-status-check success">
      <span class="material-icons" aria-hidden="true">check</span>
    </div>
    <div class="transfer-status-result">Success</div>
    <div class="transfer-status-message">{{ vm.statusMessage }}</div>
    <div class="transfer-status-table">
      <div class="transfer-status-row">
        <div>Password type</div>
        <div>SMS</div>
      </div>
      <div class="transfer-status-row">
        <div>Status</div>
        <div>Updated</div>
      </div>
      <div class="transfer-status-row">
        <div>Updated on</div>
        <div>{{ vm.completedAt | date: "dd/MM/yyyy, hh:mm a" }}</div>
      </div>
    </div>
    <div class="transfer-status-actions">
      <button class="transfer-secondary account-statement-button" type="button" ng-click="vm.newRequest()">
        Change Password
      </button>
      <button class="transfer-primary account-statement-button" type="button" ng-click="vm.goProfile()">
        Back to Profile
      </button>
    </div>
  </section>
</div>

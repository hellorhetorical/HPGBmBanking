<div class="page-card updates-page">
  <div class="page-header">
    <div class="page-title">{{ vm.title }}</div>
    <div class="page-subtitle">{{ vm.subtitle }}</div>
  </div>

  <div class="card-list loan-list">
    <a class="loan-card link-plain" href="#!/support">
      <div class="loan-card-icon">
        <span class="material-icons" aria-hidden="true">headset_mic</span>
      </div>
      <div class="loan-card-body">
        <div class="row-title">Support</div>
        <div class="row-subtitle">Contact helpdesk and branch support</div>
      </div>
      <div class="loan-pill">Open</div>
    </a>

    <a class="loan-card link-plain" href="#!/socialmedia">
      <div class="loan-card-icon">
        <span class="material-icons" aria-hidden="true">link</span>
      </div>
      <div class="loan-card-body">
        <div class="row-title">Social Media</div>
        <div class="row-subtitle">Official channels and updates</div>
      </div>
      <div class="loan-pill">View</div>
    </a>

    <a class="loan-card link-plain" href="#!/calculator">
      <div class="loan-card-icon">
        <span class="material-icons" aria-hidden="true">calculate</span>
      </div>
      <div class="loan-card-body">
        <div class="row-title">Calculators</div>
        <div class="row-subtitle">EMI, RD, FD and interest tools</div>
      </div>
      <div class="loan-pill">Open</div>
    </a>

    <a class="loan-card link-plain" href="#!/faq">
      <div class="loan-card-icon">
        <span class="material-icons" aria-hidden="true">quiz</span>
      </div>
      <div class="loan-card-body">
        <div class="row-title">FAQs</div>
        <div class="row-subtitle">Common help and troubleshooting</div>
      </div>
      <div class="loan-pill">Browse</div>
    </a>
  </div>
</div>

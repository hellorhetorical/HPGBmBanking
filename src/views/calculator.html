<div class="page-card updates-page">
  <div class="page-header">
    <div class="page-title">{{ vm.title }}</div>
    <div class="page-subtitle">{{ vm.subtitle }}</div>
  </div>

  <div class="calculator-grid">
    <a class="calculator-card link-plain" href="#!/emi">
      <div class="calculator-title">EMI</div>
      <span class="material-icons calculator-icon" aria-hidden="true">stacked_line_chart</span>
    </a>
    <a class="calculator-card link-plain" href="#!/emimoratorium">
      <div class="calculator-title">EMI (Moratorium)</div>
      <span class="material-icons calculator-icon" aria-hidden="true">layers</span>
    </a>
    <a class="calculator-card link-plain" href="#!/interest">
      <div class="calculator-title">Interest</div>
      <span class="material-icons calculator-icon" aria-hidden="true">percent</span>
    </a>
    <a class="calculator-card link-plain" href="#!/rd">
      <div class="calculator-title">Recurring Deposit</div>
      <span class="material-icons calculator-icon" aria-hidden="true">payments</span>
    </a>
    <a class="calculator-card calculator-card-wide link-plain" href="#!/fd">
      <div class="calculator-title">Fixed Deposit</div>
      <span class="material-icons calculator-icon" aria-hidden="true">savings</span>
    </a>
  </div>
</div>
